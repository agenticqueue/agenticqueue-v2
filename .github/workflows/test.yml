name: test

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - run: uv sync --frozen

      - run: pnpm install --frozen-lockfile

      - name: Set compose build stamps
        run: |
          echo "AQ_VERSION=0.0.0-ci" >> "$GITHUB_ENV"
          echo "AQ_GIT_COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "AQ_BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%S+00:00)" >> "$GITHUB_ENV"

      - run: docker compose build

      - run: docker compose up -d --wait

      - name: Assert image commit matches HEAD
        run: |
          python - <<'PY'
          import json
          import subprocess
          import urllib.request

          sha = subprocess.run(
              ["git", "rev-parse", "--short", "HEAD"],
              capture_output=True,
              check=True,
              text=True,
          ).stdout.strip()
          version = json.loads(urllib.request.urlopen("http://localhost:8001/version").read())
          assert version["commit"] == sha, f"commit mismatch: {version['commit']} vs {sha}"
          print("COMMIT_MATCHES_HEAD")
          PY

      - run: uv run pytest apps/api/tests apps/cli/tests -v

      - run: pnpm --filter @agenticqueue/web exec playwright install --with-deps chromium

      - run: pnpm --filter @agenticqueue/web exec playwright test e2e/health.spec.ts
        env:
          AQ_API_URL: http://localhost:8001
          PLAYWRIGHT_USE_DOCKER: "1"

      - if: always()
        run: docker compose down
