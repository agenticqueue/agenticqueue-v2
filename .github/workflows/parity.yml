name: parity

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - run: uv sync --frozen

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @agenticqueue/web exec playwright install --with-deps chromium

      - name: Set compose build stamps
        run: |
          echo "AQ_VERSION=0.0.0-ci" >> "$GITHUB_ENV"
          echo "AQ_GIT_COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "AQ_BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%S+00:00)" >> "$GITHUB_ENV"

      - name: Write compose CI env
        run: |
          POSTGRES_PASSWORD="$(openssl rand -hex 24)"
          AQ_KEY_LOOKUP_SECRET="$(openssl rand -hex 32)"
          AQ_SESSION_SECRET="$(openssl rand -hex 32)"
          {
            echo "POSTGRES_DB=aq2_test"
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
            echo "DATABASE_URL=postgresql+asyncpg://aq:${POSTGRES_PASSWORD}@db:5432/aq2_test"
            echo "DATABASE_URL_SYNC=postgresql+psycopg://aq:${POSTGRES_PASSWORD}@db:5432/aq2_test"
            echo "AQ_KEY_LOOKUP_SECRET=${AQ_KEY_LOOKUP_SECRET}"
            echo "AQ_SESSION_SECRET=${AQ_SESSION_SECRET}"
            echo "AQ_COOKIE_SECURE=false"
            echo "AQ_API_URL=http://api:8000"
          } > .env.ci

      - run: docker compose --env-file .env.ci build

      - run: docker compose --env-file .env.ci up -d --wait

      - name: Reset test DB before authenticated smoke
        run: docker compose --env-file .env.ci exec -T db psql -U aq -d aq2_test -v ON_ERROR_STOP=1 -c "DELETE FROM audit_log; DELETE FROM api_keys; DELETE FROM actors;"

      - name: Assert image commit matches HEAD
        run: |
          python - <<'PY'
          import json
          import subprocess
          import urllib.request

          sha = subprocess.run(
              ["git", "rev-parse", "--short", "HEAD"],
              capture_output=True,
              check=True,
              text=True,
          ).stdout.strip()
          setup_request = urllib.request.Request(
              "http://localhost:8001/setup",
              data=b"{}",
              headers={"content-type": "application/json"},
              method="POST",
          )
          setup = json.loads(urllib.request.urlopen(setup_request).read())
          key = setup["founder_key"]
          print(f"::add-mask::{key}")
          version_request = urllib.request.Request(
              "http://localhost:8001/version",
              headers={"Authorization": f"Bearer {key}"},
          )
          version = json.loads(urllib.request.urlopen(version_request).read())
          assert version["commit"] == sha, f"commit mismatch: {version['commit']} vs {sha}"
          print(f"COMMIT_MATCHES_HEAD {sha}")
          PY

      - run: uv run pytest tests/parity/test_four_surface_parity.py --junit-xml=cap-02-parity.xml
        env:
          AQ_API_URL: http://localhost:8001
          AQ_WEB_URL: http://127.0.0.1:3002
          AQ_COMPOSE_ENV_FILE: .env.ci
          POSTGRES_DB: aq2_test
          PLAYWRIGHT_USE_DOCKER: "1"

      - run: docker compose --env-file .env.ci exec -T api rm -rf /app/tests

      - run: docker compose --env-file .env.ci cp tests api:/app/tests

      - run: docker compose --env-file .env.ci exec -T api uv run --group dev pytest tests/parity/test_audit_atomicity.py --junit-xml=/tmp/atomicity-test-report.xml

      - run: docker compose --env-file .env.ci cp api:/tmp/atomicity-test-report.xml atomicity-test-report.xml

      - run: uv run pytest tests/parity/test_redactor.py --junit-xml=redactor-test.xml

      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cap-02-contract-junit
          path: |
            cap-02-parity.xml
            atomicity-test-report.xml
            redactor-test.xml

      - if: always()
        run: docker compose --env-file .env.ci down --remove-orphans
