services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      AQ_BUILT_AT: ${AQ_BUILT_AT:-1970-01-01T00:00:00Z}
      AQ_COMMIT: ${AQ_COMMIT:-dev}
      AQ_VERSION: ${AQ_VERSION:-0.1.0}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 10s
    ports:
      - "8001:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      AQ_API_URL: ${AQ_API_URL:-http://api:8000}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 10s
    ports:
      - "3002:3000"
